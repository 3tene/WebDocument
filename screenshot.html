<h2 id="スクリーンショットについて">スクリーンショットについて</h2>
<h3 id="スクリーンショットで画像を保存">スクリーンショットで画像を保存</h3>
<blockquote>
<p>左側メニューのカメラのアイコンを押して表示されている画面を画像ファイルに保存します。<br>
<br>
<img src="image/screenshot_1.png" alt="画像"><br>
<br>
スクリーンショットをすると、スクリーンショット完了のメッセージ表示を行います。<br>
<br>
<img src="image/screenshot_2.png" alt="画像"><br>
<br>
スクリーンショットは個人用フォルダーの「ピクチャ/3tene」に保存されます。<br>
メニュー部分は存在しない扱いになるので画像ファイルには保存されません。<br>
<font color="Blue">※メニュー部分も保存したい場合は PrintScreen キー等、ＯＳ標準機能を使ってください。</font><br>
<br>
スクリーンショットの細かい設定は設定の「録画」タブから変更できます。<br>
<a href="settingRecording.html">設定の「録画」タブ</a></p>
</blockquote>

</body>
</html>
