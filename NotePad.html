<h2 id="メモ機能について">メモ機能について</h2>
<blockquote>
<p>3tene内にテキストを表示させます。<br>
3teneがアクティブな状態でメモを見ることが出来ますので、ショートカット操作も可能です。<br>
v2.0.3 時点ではメモ機能はファイルを読み込み表示させる仕様でございます。</p>
</blockquote>
<h3 id="メモ機能の使い方">メモ機能の使い方</h3>
<blockquote>
<p>左側メニューのメモのアイコンをクリック<br>
<br>
ウィンドウ内の「ファイルを選択」からテキストファイルを選択するとウィンドウ内にテキストが表示されます。<br>
<br>
「ファイルを選択」の隣のドロップダウンから表示されているテキストのフォントサイズを変更できます。<br>
<br>
<img src="image/NotePad1.png" alt="画像"></p>
</blockquote>
