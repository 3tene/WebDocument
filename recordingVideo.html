<h2 id="録画について">録画について</h2>
<h3 id="録画で動画を保存">録画で動画を保存</h3>
<blockquote>
<p>左側メニューのビデオのアイコンを押して録画の開始と終了を行います。<br>
<br>
<img src="image/recordingVideo_1.png" alt="画像"><br>
<br>
録画を開始すると、録画開始のメッセージ表示と録画中を示すRECのアイコン表示を行います。<br>
<br>
<img src="image/recordingVideo_2.png" alt="画像"><br>
<br>
録画を終了すると、録画終了のメッセージ表示をして、録画中を示すRECのアイコンは非表示になります。<br>
<br>
<img src="image/recordingVideo_3.png" alt="画像"><br>
<br>
録画した動画は個人用フォルダーの「ビデオ/3tene」に保存されます。<br>
メニュー部分は存在しない扱いになるので動画ファイルには保存されません。<br>
<font color="Blue">※メニュー部分も保存したい場合はＯＳ標準機能を使ってください。</font><br>
<br>
録画の細かい設定は設定の「録画」タブから変更できます。<br>
<a href="settingRecording.html">設定の「録画」タブ</a></p>
</blockquote>

</body>
</html>
