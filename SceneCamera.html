<h2 id="シーンカメラについて">シーンカメラについて</h2>
<blockquote>
<p>シーンカメラを移動させてアバターを見る位置や角度を変更します。</p>
</blockquote>
<h3 id="カメラの平行移動">カメラの平行移動</h3>
<blockquote>
<p>シーンカメラは起動時に平行移動に設定されています。<br>
その状態でマウスの右ボタンをドラッグ操作するとカメラが上下に移動します。<br>
<br>
<img src="image/SceneCamera_1.png" alt="画像"><br>
<br>
この状態でマウスの右ボタンを左にドラッグ操作すると…<br>
<br>
<img src="image/SceneCamera_2.png" alt="画像"><br>
<br>
左側に移動します。</p>
</blockquote>
<h3 id="カメラの回転移動">カメラの回転移動</h3>
<blockquote>
<p>右側メニューのシーンカメラの切り替えをクリックすると回転に切り替わります。<br>
<br>
<img src="image/SceneCamera_3.png" alt="画像"><br>
<br>
この状態でマウスの右ボタンをドラッグ操作すると…<br>
<br>
<img src="image/SceneCamera_4.png" alt="画像"><br>
<br>
シーンカメラが回転移動します。</p>
</blockquote>

</body>
</html>
